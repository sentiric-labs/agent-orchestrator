name: 📈 Analiz ve Öğrenme Döngüsü

on:
  schedule:
    # Gerçek senaryoda bu, haftada bir kez çalışır (Örn: Pazar sabahı)
    - cron: '0 4 * * 0'
  workflow_dispatch:
    # İstediğimiz zaman manuel basıp çalıştırabilmemiz için

jobs:
  run-analytics:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Repoyu Klonla
        uses: actions/checkout@v4

      - name: ⚙️ Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Bağımlılıkları Yükle
        run: npm install

      - name: 📊 Analiz Ajanını Çalıştır
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: npm run analyze
